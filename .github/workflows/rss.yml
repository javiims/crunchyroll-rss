name: Actualizar RSS Crunchyroll

on:
  schedule:
    - cron: '0 8 * * *' # Se ejecuta todos los días a las 08:00 UTC
  workflow_dispatch: # Te permite ejecutarlo a mano si quieres probarlo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar el rastreador
        run: python scraper.py

      - name: Guardar cambios en el RSS
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add feed.xml
          git commit -m "Actualización del feed RSS" || exit 0
          git push
