name: Crunchyroll RSS Tracker

on:
  schedule:
    # Se ejecuta en el minuto 0 cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: # Permite que lo ejecutes a mano con el botón

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium --with-deps
        
    - name: Run tracker
      run: python scraper.py
      
    - name: Guardar RSS y actualizar lista de enlaces
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        # Añadimos ambos archivos para guardarlos en el repositorio
        git add feed.xml links.txt
        git commit -m "Actualización del RSS y limpieza de links detectados" || exit 0
        git push
