name: Crunchyroll RSS Tracker
on:
  schedule:
  - cron: 0 */6 * * *
  workflow_dispatch: null
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run tracker
      run: python scraper.py
    - name: Guardar RSS y actualizar lista de enlaces
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add feed.xml links.txt
        git commit -m "Actualización del RSS y limpieza de links detectados" || exit 0
        git push
